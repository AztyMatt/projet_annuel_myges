apiVersion: batch/v1
kind: CronJob
metadata:
  name: uploads-backup
  namespace: backend
spec:
  schedule: "30 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 10
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          initContainers:
            - name: archive
              image: alpine:3
              command:
                - sh
                - -c
                - |
                  set -eu
                  TS=$(date +%Y%m%d-%H%M%S)
                  DEST="/backups/uploads-$TS.tar.gz"
                  echo "[archive] /data/uploads -> $DEST"
                  tar -czf "$DEST" -C /data/uploads .
                  echo "[archive] prune local > 14 jours"
                  find /backups -name 'uploads-*.tar.gz' -mtime +14 -delete
                  echo "[archive] ok: $DEST ($(du -h "$DEST" | cut -f1))"
              volumeMounts:
                - name: uploads
                  mountPath: /data/uploads
                  readOnly: true
                - name: backups
                  mountPath: /backups
          containers:
            - name: offsite
              image: rclone/rclone:1
              env:
                - name: RCLONE_CONFIG_B2_TYPE
                  value: s3
                - name: RCLONE_CONFIG_B2_PROVIDER
                  value: Other
                - name: RCLONE_CONFIG_B2_ACL
                  value: private
                - name: RCLONE_CONFIG_B2_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: backup-s3-secrets
                      key: BACKUP_S3_ACCESS_KEY
                - name: RCLONE_CONFIG_B2_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: backup-s3-secrets
                      key: BACKUP_S3_SECRET_KEY
                - name: RCLONE_CONFIG_B2_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: backup-s3-secrets
                      key: BACKUP_S3_ENDPOINT
                - name: RCLONE_CONFIG_B2_REGION
                  valueFrom:
                    secretKeyRef:
                      name: backup-s3-secrets
                      key: BACKUP_S3_REGION
                - name: BACKUP_S3_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: backup-s3-secrets
                      key: BACKUP_S3_BUCKET
              command:
                - sh
                - -c
                - |
                  set -eu
                  echo "[offsite] push -> b2:$BACKUP_S3_BUCKET/uploads"
                  rclone copy /backups "b2:$BACKUP_S3_BUCKET/uploads" \
                    --s3-no-check-bucket \
                    --stats-one-line -v
                  echo "[offsite] prune distant > 30 jours"
                  rclone delete "b2:$BACKUP_S3_BUCKET/uploads" \
                    --min-age 30d --s3-no-check-bucket -v
                  echo "[offsite] ok"
              volumeMounts:
                - name: backups
                  mountPath: /backups
          volumes:
            - name: uploads
              persistentVolumeClaim:
                claimName: backend-uploads
            - name: backups
              persistentVolumeClaim:
                claimName: uploads-backups
